<style>
:root{
  --bg:#f8f4ee; --bg-2:#f0e9dd; --blush:#e3d2c6; --card:#fffdf9;
  --gold:#b0905c; --gold-deep:#8a6f44; --ink:#2c2620; --ink-soft:#857a6c;
  --line:rgba(44,38,32,.14); --line-soft:rgba(44,38,32,.08);
  --serif:"Cormorant Garamond",Georgia,serif;
  --sans:"Jost","Montserrat",system-ui,sans-serif;
  --radius:14px; --shadow:0 24px 60px -28px rgba(44,38,32,.30);
  --max:760px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans); color:var(--ink); background:var(--bg);
  font-weight:300; line-height:1.6; -webkit-font-smoothing:antialiased;
  font-size:16px;
}
.wrap{max-width:var(--max);margin:0 auto;padding:0 18px}

/* Header */
header{position:sticky;top:0;z-index:30;background:rgba(248,244,238,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line-soft)}
.head-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;max-width:var(--max);margin:0 auto}
.brand{display:flex;flex-direction:column;line-height:1;text-decoration:none;color:var(--ink)}
.brand-name{font-family:var(--serif);font-weight:600;font-size:26px;letter-spacing:.5px}
.brand-name small{display:block;font-family:var(--sans);font-weight:400;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-deep);margin-top:3px}
.lang{display:flex;gap:2px;align-items:center}
.lang button{background:none;border:1px solid var(--line);color:var(--ink-soft);font-family:var(--sans);font-size:12px;font-weight:500;letter-spacing:1px;padding:6px 10px;border-radius:8px;cursor:pointer;transition:.15s}
.lang button.active{background:var(--gold);border-color:var(--gold);color:#fff}

/* Progress */
.progress{max-width:var(--max);margin:0 auto;padding:14px 18px 0}
.bar{height:5px;background:var(--bg-2);border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-deep));border-radius:99px;transition:width .35s ease;width:16%}
.steplabel{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);margin-top:8px}

/* Main */
main{padding:22px 0 40px}
h1{font-family:var(--serif);font-weight:600;font-size:30px;line-height:1.15;margin:.2em 0 .3em}
h2{font-family:var(--serif);font-weight:600;font-size:23px;color:var(--gold-deep);margin:1.4em 0 .5em;padding-bottom:.25em;border-bottom:1px solid var(--line-soft)}
h3{font-family:var(--sans);font-weight:600;font-size:15px;letter-spacing:.5px;margin:1.2em 0 .4em;text-transform:uppercase;color:var(--ink)}
p{margin:.5em 0}
.lead{color:var(--ink-soft);font-size:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin:14px 0}
.muted{color:var(--ink-soft);font-size:13px}
ul.risks{list-style:none;padding:0;margin:.4em 0}
ul.risks li{position:relative;padding:7px 0 7px 22px;border-bottom:1px solid var(--line-soft);font-size:14.5px}
ul.risks li:before{content:"";position:absolute;left:2px;top:14px;width:7px;height:7px;border-radius:50%;background:var(--gold)}
ul.risks li b{font-weight:600}
.addbanner{display:inline-block;background:var(--gold);color:#fff;font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:7px 16px;border-radius:99px;margin:34px 0 4px}
.policy{background:#fbeeee;border:1px solid #e6c9c9;border-left:4px solid #c0676b;border-radius:10px;padding:12px 14px;font-size:14px;color:#5c2b2e;margin:12px 0}
.policy b{color:#7a2f33}

/* Choice cards (service / technique / language) */
.choices{display:grid;gap:12px;margin:16px 0}
.choices.cols2{grid-template-columns:1fr 1fr}
.choice{display:flex;align-items:center;gap:14px;background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:.15s;text-align:left;width:100%;font-family:inherit;color:inherit;font-size:16px}
.choice:hover{border-color:var(--gold)}
.choice.sel{border-color:var(--gold);background:#fbf6ee;box-shadow:0 0 0 3px rgba(176,144,92,.15)}
.choice .ico{font-size:24px;width:34px;flex-shrink:0;text-align:center;color:var(--gold);display:flex;align-items:center;justify-content:center}
.choice .ico svg{width:32px;height:32px;display:block}
.choice .ct strong{display:block;font-family:var(--serif);font-size:20px;font-weight:600}
.choice .ct span{font-size:13px;color:var(--ink-soft)}

/* Fields */
label.fld{display:block;margin:12px 0}
label.fld>span{display:block;font-size:12px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px}
input[type=text],input[type=tel],input[type=email],input[type=date],input[type=number],textarea,select{
  width:100%;font-family:var(--sans);font-size:16px;color:var(--ink);background:#fff;
  border:1px solid var(--line);border-radius:10px;padding:12px 13px;font-weight:300;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(176,144,92,.15)}
textarea{min-height:80px;resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.req{color:var(--gold-deep)}

/* Yes/No toggles */
.yn{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;flex-shrink:0}
.yn button{background:#fff;border:none;padding:7px 16px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;color:var(--ink-soft)}
.yn button.on-yes{background:var(--gold);color:#fff}
.yn button.on-no{background:var(--ink-soft);color:#fff}

/* Medical condition rows */
.cond{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-soft)}
.cond .cl{font-size:14px;flex:1}
.cond .note{margin-top:8px}
.condwrap{margin-top:6px}

/* Declaration */
.decl{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line-soft)}
.decl input[type=checkbox]{width:22px;height:22px;flex-shrink:0;accent-color:var(--gold);margin-top:2px}
.decl label{font-size:14px;cursor:pointer}

/* Signature */
.sigbox{border:1.5px dashed var(--gold);border-radius:var(--radius);background:#fff;position:relative;touch-action:none}
.sigbox canvas{display:block;width:100%;height:200px;border-radius:var(--radius)}
.sighint{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);color:var(--ink-soft);font-size:14px;pointer-events:none;opacity:.6}
.sigline{position:absolute;left:24px;right:24px;bottom:42px;border-bottom:1px solid var(--line)}

/* Buttons */
.nav{display:flex;gap:12px;margin-top:24px}
.btn{font-family:var(--sans);font-weight:500;font-size:15px;letter-spacing:.5px;border-radius:99px;padding:14px 26px;cursor:pointer;border:1px solid transparent;transition:.15s;flex:1;text-align:center}
.btn.primary{background:var(--gold);color:#fff;border-color:var(--gold)}
.btn.primary:hover{background:var(--gold-deep)}
.btn.ghost{background:transparent;color:var(--ink);border-color:var(--line)}
.btn.ghost:hover{border-color:var(--ink)}
.btn[disabled]{opacity:.4;cursor:not-allowed}
.btn.small{flex:0 0 auto;padding:9px 16px;font-size:13px}

.err{color:#b0413e;font-size:13px;margin-top:6px;display:none}
.err.show{display:block}
.field-bad input,.field-bad textarea,.field-bad select{border-color:#d98a87}
.condwrap.field-bad,.cond.field-bad,.choices.field-bad{outline:2px solid #d98a87;outline-offset:3px;border-radius:8px;background:#fdf0ef}
input[readonly]{background:var(--bg-2);color:var(--ink-soft);cursor:not-allowed}
.toast{position:fixed;top:74px;left:50%;transform:translateX(-50%) translateY(-12px);background:#b0413e;color:#fff;font-family:var(--sans);font-size:14px;font-weight:500;padding:13px 20px;border-radius:12px;z-index:200;box-shadow:0 14px 36px -10px rgba(176,65,62,.6);max-width:92%;text-align:center;opacity:0;pointer-events:none;transition:.25s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.hide{display:none!important}
.center{text-align:center}
.govnote{font-size:12px;color:var(--ink-soft);font-style:italic;margin-top:10px;text-align:center}
footer{text-align:center;padding:24px;color:var(--ink-soft);font-size:11px;letter-spacing:1px}

/* Review doc */
.docview h2{font-size:20px}
.docview .meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;background:var(--bg-2);border-radius:10px;padding:12px 14px;margin:10px 0}
.docview .meta b{color:var(--ink-soft);font-weight:500;display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px}

@media(max-width:560px){
  .grid3{grid-template-columns:1fr}
  .grid2{grid-template-columns:1fr}
  .choices.cols2{grid-template-columns:1fr}
  h1{font-size:26px}
  .nav{flex-direction:column-reverse}
  .docview .meta{grid-template-columns:1fr}
}
@media print{
  header,.progress,.nav,.lang,footer{display:none!important}
  body{background:#fff}
  .card{box-shadow:none;border:none;page-break-inside:avoid}
}
</style>
</head>

function setLang(l){
  lang = l; document.documentElement.lang = l;
  document.querySelectorAll(".lang button").forEach(b=>b.classList.toggle("active",b.dataset.lang===l));
  render();
}
document.querySelectorAll(".lang button").forEach(b=>b.addEventListener("click",()=>setLang(b.dataset.lang)));

function progress(){
  document.getElementById("pbar").style.width = Math.round(((step+1)/TOTAL)*100)+"%";
  document.getElementById("plabel").textContent = (step+1)+" / "+TOTAL+" · "+STEPS2[lang][step];
}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function render(){
  progress(); window.scrollTo(0,0);
  if(step===0) return renderService();
  return renderDocument();
}
function goBack(){ if(step>0){step--; render();} }

/* ---------- STEP 0 — Service ---------- */
function renderService(){
  const x=t();
  app.innerHTML=`
  <h1>${x.chooseService}</h1>
  <p class="muted">${x.chooseServiceSub}</p>
  <div class="choices">
    ${SERVICES.map(s=>`<button class="choice ${state.service===s?'sel':''}" onclick="pickService('${s}')">
      <span class="ico">${ICONS[s]}</span>
      <span class="ct"><strong>${x.svc[s].t}</strong><span>${x.svc[s].d}</span></span></button>`).join("")}
  </div>`;
}
function pickService(s){
  if(state.service!==s){ state.technique=null; }
  state.service=s; step=1; render();
}

      <button class="choice ${state.photo==='no'?'sel':''}" onclick="pickGroup(this,'photo','no')"><span class="ico">✕</span><span class="ct"><strong style="font-size:16px">${x.photoNo}</strong></span></button>

/* ---- in-place toggles (no re-render, preserves scroll + signature) ---- */
function pickGroup(el,key,val){
  state[key]=val;
  el.parentElement.classList.remove('field-bad');
  el.parentElement.querySelectorAll('.choice').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
}
function pickTechCard(el,tech){
  state.technique=tech;
  el.parentElement.classList.remove('field-bad');
  el.parentElement.querySelectorAll('.choice').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
}
function ynHTML(key,val){
  return `<div class="yn">
    <button class="${val==='yes'?'on-yes':''}" onclick="ynClick(this,'${key}','yes')">${t().yes}</button>
    <button class="${val==='no'?'on-no':''}" onclick="ynClick(this,'${key}','no')">${t().no}</button></div>`;
}
function ynClick(el,key,val){
  const yn=el.parentElement, btns=yn.querySelectorAll('button');
  btns[0].className=val==='yes'?'on-yes':''; btns[1].className=val==='no'?'on-no':'';
  const cont=document.getElementById('cond_'+key); if(cont)cont.classList.remove('field-bad');
  if(key==='special') state.special=val;
  else if(key==='prev'){ state.prev=val; const n=document.getElementById('prevNote'); if(n)n.classList.toggle('hide',val!=='yes'); }
  else if(key[0]==='c'){ state.conditions[key]={...(state.conditions[key]||{}),yn:val}; const note=document.getElementById('note_'+key); if(note)note.classList.toggle('hide',val!=='yes'); }
}
function condRow(c,i){
  const cur=state.conditions['c'+i]||{};
  return `<div class="condwrap" id="cond_c${i}">
    <div class="cond"><div class="cl">${c}</div>${ynHTML('c'+i,cur.yn)}</div>
    <div class="note ${cur.yn==='yes'?'':'hide'}" id="note_c${i}">
      <input type="text" placeholder="${t().notes}" value="${esc(cur.note||'')}" oninput="state.conditions['c${i}']={...(state.conditions['c${i}']||{}),note:this.value}">
    </div></div>`;
}

/* Signature pad (vanilla) */
let sigCtx,sigCanvas,drawing=false,hasSig=false;
function initSig(){
  sigCanvas=document.getElementById('sig');
  const box=document.getElementById('sigbox');
  const ratio=window.devicePixelRatio||1;
  const w=box.clientWidth, h=200;
  sigCanvas.width=w*ratio; sigCanvas.height=h*ratio;
  sigCtx=sigCanvas.getContext('2d');
  sigCtx.scale(ratio,ratio);
  sigCtx.lineWidth=2.2; sigCtx.lineCap='round'; sigCtx.lineJoin='round'; sigCtx.strokeStyle='#2c2620';
  hasSig=false;
  const pos=(e)=>{const r=sigCanvas.getBoundingClientRect();const p=e.touches?e.touches[0]:e;return{x:p.clientX-r.left,y:p.clientY-r.top};};
  const start=(e)=>{e.preventDefault();drawing=true;const{x,y}=pos(e);sigCtx.beginPath();sigCtx.moveTo(x,y);};
  const move=(e)=>{if(!drawing)return;e.preventDefault();const{x,y}=pos(e);sigCtx.lineTo(x,y);sigCtx.stroke();if(!hasSig){hasSig=true;const h=document.getElementById('sighint');if(h)h.style.display='none';}};
  const end=()=>{drawing=false;};
  sigCanvas.addEventListener('mousedown',start);sigCanvas.addEventListener('mousemove',move);
  window.addEventListener('mouseup',end);
  sigCanvas.addEventListener('touchstart',start,{passive:false});
  sigCanvas.addEventListener('touchmove',move,{passive:false});
  sigCanvas.addEventListener('touchend',end);
}
function clearSig(){if(sigCtx){sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);hasSig=false;const h=document.getElementById('sighint');if(h)h.style.display='block';}}

/* Age auto-calc + US phone mask */
function calcAge(el){
  state.fields.dob=el.value;
  const dob=new Date(el.value+'T00:00:00');
  const ageEl=document.getElementById('f_age');
  if(isNaN(dob.getTime())){ state.fields.age=''; if(ageEl)ageEl.value=''; return; }
  const now=new Date();
  let age=now.getFullYear()-dob.getFullYear();
  const m=now.getMonth()-dob.getMonth();
  if(m<0||(m===0&&now.getDate()<dob.getDate())) age--;
  if(age<0||age>130){ state.fields.age=''; if(ageEl)ageEl.value=''; return; }
  state.fields.age=String(age); if(ageEl)ageEl.value=age;
  const w=el.closest('[data-f]'); if(w)w.classList.remove('field-bad');
  const wa=ageEl?ageEl.closest('[data-f]'):null; if(wa)wa.classList.remove('field-bad');
}
function maskPhone(el,key){
  let d=el.value.replace(/\D/g,'').slice(0,10), out=d;
  if(d.length>6) out='('+d.slice(0,3)+') '+d.slice(3,6)+'-'+d.slice(6);
  else if(d.length>3) out='('+d.slice(0,3)+') '+d.slice(3);
  else if(d.length>0) out='('+d;
  el.value=out; state.fields[key]=out;
}

/* Submit + validation */
let toastTimer;
function showToast(msg){
  const tt=document.getElementById('toast');
  tt.textContent=msg; tt.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>tt.classList.remove('show'),4200);
}
function fail(msg,elId){
  showToast(msg);
  if(elId){const el=document.getElementById(elId); if(el)el.scrollIntoView({behavior:'smooth',block:'center'});}
}
function mark(id,bad){const el=document.getElementById(id); if(el)el.classList.toggle('field-bad',bad);}
function submitForm(){
  const x=t(); const a=ADD[lang][state.service];
  const condMsg = lang==='en'?'Please answer Yes or No for every medical condition.':lang==='es'?'Responda Sí o No en cada condición médica.':'Responda Sim ou Não em cada condição médica.';
  // 1. technique
  if(!state.technique){ mark('techChoices',true); return fail(x.reqWarn,'techChoices'); }
  // 2. service-specific Yes/No (overview order: special disclosure, then previous work)
  if(a.specialTitle && !state.special){ mark('cond_special',true); return fail(x.reqWarn,'cond_special'); }
  if(!state.prev){ mark('cond_prev',true); return fail(x.reqWarn,'cond_prev'); }
  // 3. patch test
  if(!state.patch){ mark('patchChoices',true); return fail(x.patchWarn,'patchChoices'); }
  // 4. declaration — every checkbox
  if(!x.declItems.every((_,i)=>state.decl[i])) return fail(x.declWarn,'d0');
  // 5. personal fields (all required)
  const req=['fullname','dob','age','phone','email','address','city','state','id'];
  let firstBad=null;
  req.forEach(k=>{
    const el=document.getElementById('f_'+k); const wrap=el.closest('[data-f]');
    if(!el.value.trim()){wrap.classList.add('field-bad'); if(!firstBad)firstBad='f_'+k;} else wrap.classList.remove('field-bad');
  });
  if(firstBad) return fail(x.reqWarn,firstBad);
  // 6. EVERY medical condition must be answered Yes/No
  let firstCond=null;
  for(let i=0;i<x.conditions.length;i++){
    const c=state.conditions['c'+i]; const answered=c&&(c.yn==='yes'||c.yn==='no');
    mark('cond_c'+i,!answered);
    if(!answered && firstCond===null) firstCond='cond_c'+i;
  }
  if(firstCond) return fail(condMsg,firstCond);
  // 7. photo consent
  if(!state.photo){ mark('photoChoices',true); return fail(x.photoWarn,'photoChoices'); }
  // 8. signature
  if(!hasSig) return fail(x.sigWarn,'sigbox');

  state.signature=sigCanvas.toDataURL('image/png');
  const payload=buildPayload();
  try{localStorage.setItem('lastConsent',JSON.stringify(payload));}catch(e){}
  if(CONFIG.WEBHOOK_URL){
    fetch(CONFIG.WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
      .then(()=>showThanks()).catch(()=>showThanks());
  } else { showThanks(); }
}
function buildPayload(){
  const conds={};
  Object.keys(state.conditions).forEach(k=>{const c=state.conditions[k];if(c&&c.yn==='yes'){const idx=parseInt(k.substring(1));conds[C.en.conditions[idx]]=c.note||'yes';}});
  return {
    language:lang, governing_language:'en', business:CONFIG.BUSINESS,
    service:C.en.svc[state.service].t, service_key:state.service,
    technique:state.technique, pigment:state.pigment,
    patch_test:state.patch, photo_consent:state.photo,
    previous_work:state.prev, special_disclosure:state.special,
    client:{
      full_name:state.fields.fullname, dob:state.fields.dob, age:state.fields.age,
      phone:state.fields.phone, email:state.fields.email, address:state.fields.address,
      city:state.fields.city, state_zip:state.fields.state,
      emergency_name:state.fields.ec_name, emergency_phone:state.fields.ec_phone, id:state.fields.id
    },
    medications:state.fields.meds, medical_flags:conds,
    declaration_all_agreed:true,
    signature_png:state.signature, signed_date:state.date,
    submitted_at:new Date().toISOString(),
    filename:(state.fields.fullname||'Client').replace(/[^\w]+/g,'')+'_'+C.en.svc[state.service].t+'_'+new Date().toISOString().slice(0,10)+'.pdf',
    html_document:fullPrintHTML()
  };
}

/* Select-all helpers */
function setAllDecl(checked){
  const x=t();
  for(let i=0;i<x.declItems.length;i++){ state.decl[i]=checked; const cb=document.getElementById('d'+i); if(cb)cb.checked=checked; }
}
function setAllConditions(val){
  const x=t();
  for(let i=0;i<x.conditions.length;i++){
    state.conditions['c'+i]={...(state.conditions['c'+i]||{}),yn:val};
    const el=document.getElementById('cond_c'+i); if(el)el.classList.remove('field-bad');
  }
  const card=document.getElementById('condCard'); if(card) card.innerHTML=x.conditions.map((c,i)=>condRow(c,i)).join("");
}

  const hPrev = lang==='en'?'Previous Work Disclosure':lang==='es'?'Declaración de Trabajo Previo':'Declaração de Trabalho Anterior';
  const hSrisk = (lang==='en'?'Service-Specific Risks':lang==='es'?'Riesgos Específicos del Servicio':'Riscos Específicos do Serviço')+' — '+svcName;
  return `<div class="pdoc">
    <div class="phead"><div class="pbrand">Kika Bergmann</div><div class="psub">${CONFIG.BUSINESS} · ${x.formTitle}</div></div>
    <table class="pmeta"><tr><td><b>${x.f_fullname}:</b> ${esc(f.fullname||'')}</td><td><b>${x.dateAuto}:</b> ${state.date}</td></tr>
      <tr><td><b>${svcName}:</b> ${esc(state.technique||'')}</td><td><b>${x.f_email}:</b> ${esc(f.email||'')}</td></tr></table>

    <h2>${ovTitle}</h2>
    ${a.overview.map(p=>`<p>${p}</p>`).join('')}
    <p class="pol"><b>${tu.split(':')[0]}:</b>${tu.substring(tu.indexOf(':')+1)}</p>
    ${special}
    <p><b>${hPrev}:</b> ${a.prevQ} &nbsp;→&nbsp; <b>${ans(state.prev)}</b></p>
    <h3>${hSrisk}</h3>
    <ul>${a.risks.map(r=>`<li><b>${r[0]}:</b> ${r[1]}</li>`).join('')}</ul>

    <h2>${x.generalTitle}</h2>
    <p>${x.generalP1}</p><p>${x.generalP2}</p>
    <h3>${x.risksTitle}</h3>
    <ul>${x.risksAll.map(r=>`<li><b>${r[0]}:</b> ${r[1]}</li>`).join('')}</ul>
    <p><b>${x.patchTitle}:</b> ${state.patch==='waive'?x.patchWaive:state.patch==='request'?x.patchRequest:'—'}</p>

    <h2>${x.declTitle}</h2>
    ${declList}

    <h2>${x.medTitle}</h2>
    <table class="pinfo">
      <tr><td><b>${x.f_fullname}</b><br>${esc(f.fullname||'')}</td><td><b>${x.f_dob}</b><br>${esc(f.dob||'')}</td><td><b>${x.f_age}</b><br>${esc(f.age||'')}</td></tr>
      <tr><td><b>${x.f_phone}</b><br>${esc(f.phone||'')}</td><td><b>${x.f_email}</b><br>${esc(f.email||'')}</td><td><b>${x.f_id}</b><br>${esc(f.id||'')}</td></tr>
      <tr><td colspan="2"><b>${x.f_address}</b><br>${esc(f.address||'')}</td><td><b>${x.f_city} / ${x.f_state}</b><br>${esc(f.city||'')} ${esc(f.state||'')}</td></tr>
      <tr><td><b>${x.f_ec_name}</b><br>${esc(f.ec_name||'')}</td><td colspan="2"><b>${x.f_ec_phone}</b><br>${esc(f.ec_phone||'')}</td></tr>

    <p><b>${x.medsLabel.split('—')[0].trim()}:</b> ${esc(f.meds||'')}</p>

function showThanks(){
  const x=t();
  const testNote = CONFIG.WEBHOOK_URL ? '' :
    `<p class="muted" style="margin-top:18px">${lang==='en'?'Test build — PDF generation and archiving will be enabled in the next phase (n8n).':lang==='es'?'Versión de prueba — la generación de PDF y el archivo se activarán en la próxima fase (n8n).':'Versão de teste — a geração do PDF e o arquivamento serão ativados na próxima fase (n8n).'}</p>`;
  window.scrollTo(0,0);
  app.innerHTML=`<div class="center" style="padding:40px 0">
    <div style="font-size:60px;color:var(--gold)">✦</div>
    <h1>${x.thanksTitle}</h1>
    <p class="lead">${x.thanksText}</p>
    ${testNote}
  </div>`;
  document.getElementById('pbar').style.width='100%';
}
